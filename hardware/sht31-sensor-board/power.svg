<svg xmlns="http://www.w3.org/2000/svg" width="800" height="480" viewBox="0 0 800 480">
  <rect width="800" height="480" fill="#fafafa" stroke="#d0d0d0" stroke-width="1"/>
  <!-- Title block -->
  <rect x="0" y="440" width="800" height="40" fill="#f0f0f0" stroke="#ccc" stroke-width="1"/>
  <text x="16" y="466" font-family="monospace" font-size="13" fill="#333">SHT31 Sensor Board  |  Sheet 1: Power Supply (5V → 3.3V)</text>
  <text x="680" y="466" font-family="monospace" font-size="12" fill="#666">Rev A  |  Altium</text>

  <!-- USB-C symbol -->
  <rect x="40" y="160" width="60" height="100" rx="6" fill="white" stroke="#444" stroke-width="2"/>
  <text x="70" y="196" text-anchor="middle" font-family="monospace" font-size="11" fill="#555">USB-C</text>
  <text x="70" y="212" text-anchor="middle" font-family="monospace" font-size="11" fill="#555">J1</text>
  <!-- VBUS line from USB-C -->
  <line x1="100" y1="180" x2="180" y2="180" stroke="#c0392b" stroke-width="2"/>
  <text x="130" y="172" font-family="monospace" font-size="11" fill="#c0392b">VBUS(5V)</text>

  <!-- P-MOSFET Q1 -->
  <rect x="180" y="150" width="80" height="70" rx="4" fill="white" stroke="#444" stroke-width="1.5"/>
  <text x="220" y="178" text-anchor="middle" font-family="monospace" font-size="12" fill="#333">Q1</text>
  <text x="220" y="196" text-anchor="middle" font-family="monospace" font-size="10" fill="#666">DMG2305UX</text>
  <text x="220" y="212" text-anchor="middle" font-family="monospace" font-size="10" fill="#666">P-MOSFET</text>
  <!-- line from Q1 to LDO -->
  <line x1="260" y1="180" x2="340" y2="180" stroke="#c0392b" stroke-width="2"/>

  <!-- Coin cell -->
  <rect x="40" y="290" width="60" height="70" rx="4" fill="white" stroke="#444" stroke-width="1.5"/>
  <text x="70" y="318" text-anchor="middle" font-family="monospace" font-size="11" fill="#555">BT1</text>
  <text x="70" y="334" text-anchor="middle" font-family="monospace" font-size="11" fill="#555">CR2032</text>
  <text x="70" y="350" text-anchor="middle" font-family="monospace" font-size="11" fill="#555">3V</text>
  <line x1="100" y1="305" x2="180" y2="305" stroke="#e67e22" stroke-width="2"/>
  <!-- dashed line from coin cell to Q1 body (OR-ing path) -->
  <line x1="200" y1="305" x2="200" y2="220" stroke="#e67e22" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="118" y="298" font-family="monospace" font-size="11" fill="#e67e22">VBAT(3V)</text>

  <!-- LDO U3 -->
  <rect x="340" y="140" width="120" height="90" rx="4" fill="white" stroke="#2980b9" stroke-width="2"/>
  <text x="400" y="168" text-anchor="middle" font-family="monospace" font-size="12" fill="#333">U3</text>
  <text x="400" y="186" text-anchor="middle" font-family="monospace" font-size="11" fill="#2980b9">TLV1117-33</text>
  <text x="400" y="204" text-anchor="middle" font-family="monospace" font-size="10" fill="#666">800mA LDO</text>
  <text x="400" y="220" text-anchor="middle" font-family="monospace" font-size="10" fill="#666">SOT-223</text>
  <!-- LDO output line -->
  <line x1="460" y1="180" x2="580" y2="180" stroke="#27ae60" stroke-width="2.5"/>
  <text x="490" y="172" font-family="monospace" font-size="12" fill="#27ae60" font-weight="bold">3V3</text>

  <!-- Bulk cap C1 -->
  <rect x="520" y="195" width="50" height="50" rx="4" fill="white" stroke="#666" stroke-width="1.5"/>
  <text x="545" y="217" text-anchor="middle" font-family="monospace" font-size="11" fill="#555">C1</text>
  <text x="545" y="233" text-anchor="middle" font-family="monospace" font-size="10" fill="#666">100µF</text>
  <line x1="545" y1="195" x2="545" y2="180" stroke="#27ae60" stroke-width="1.5"/>
  <line x1="545" y1="245" x2="545" y2="270" stroke="#888" stroke-width="1.5"/>

  <!-- Output load symbol -->
  <rect x="580" y="155" width="100" height="60" rx="4" fill="#e8f5e9" stroke="#27ae60" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="630" y="180" text-anchor="middle" font-family="monospace" font-size="11" fill="#2e7d32">ESP32-WROOM</text>
  <text x="630" y="198" text-anchor="middle" font-family="monospace" font-size="11" fill="#2e7d32">+ SHT31</text>

  <!-- GND symbol -->
  <line x1="400" y1="230" x2="400" y2="270" stroke="#333" stroke-width="1.5"/>
  <line x1="380" y1="270" x2="420" y2="270" stroke="#333" stroke-width="2"/>
  <line x1="386" y1="278" x2="414" y2="278" stroke="#333" stroke-width="1.5"/>
  <line x1="392" y1="286" x2="408" y2="286" stroke="#333" stroke-width="1"/>
  <text x="400" y="302" text-anchor="middle" font-family="monospace" font-size="12" fill="#333">GND</text>

  <!-- Design notes box -->
  <rect x="40" y="40" width="280" height="90" rx="4" fill="#fffde7" stroke="#f9a825" stroke-width="1"/>
  <text x="55" y="62" font-family="monospace" font-size="12" fill="#e65100" font-weight="bold">ASSEMBLY NOTE</text>
  <text x="55" y="80" font-family="monospace" font-size="11" fill="#555">Populate Q1 before applying</text>
  <text x="55" y="97" font-family="monospace" font-size="11" fill="#555">power. TLV1117 has no reverse</text>
  <text x="55" y="114" font-family="monospace" font-size="11" fill="#555">current protection (see results).</text>
</svg>
